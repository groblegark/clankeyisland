# Clanker City Chronicles — seed config for the browser build.
# On first visit, the ScummVM emscripten backend fetches this file from the
# site root and stores it in the browser's IndexedDB (it will NOT be
# re-fetched for returning visitors — bump the target name or have users
# clear site data when changing this file).
# /clankeyisland is substituted by tools/build-web.sh.

[scummvm]
gui_return_to_launcher_at_exit=false

[chronicles]
engineid=scumm
gameid=tentacle
description=Clanker City Chronicles
path=/clankeyisland/data/games/chronicles
# The data files masquerade as Day of the Tentacle (homebrew has no
# detection entry), so skip the unknown-MD5 game data warning.
check_gamedata=false
# Pin the music path the wasm build actually has: the AdLib OPL
# emulator (no soundfont/WebMIDI in the browser). See docs/research/AUDIO.md.
music_driver=adlib
opl_driver=db
# In-game voice (monster.sou): keep text on screen alongside speech.
# Without an explicit subtitles=true, ScummVM only force-enables text
# when the .sou is MISSING (scumm.cpp:1541) -- so shipping voices would
# silently turn subtitles off. The walkthrougher and the deadpan
# captions both depend on visible text.
subtitles=true
speech_mute=false
