# Clanker City Chronicles — the full run, boot into Act Two.
# Docks (bolt, poster) -> tavern (servo -> token -> darts -> oil can)
# -> docks (Betty -> crate -> the first wind-up key) -> the alley
# (Rivet -> dumpster magnet) -> docks (fish the drain: nine bolts)
# -> alley (riddle duel: the tenth -> pay the funicular fare)
# -> Midtown (case the street -> sign up for talent night)
# -> the Grand Cog (wake the spotlight -> the act -> backstage pass)
# -> backstage (Voltina's three-card reading -> the truth -> Key #2)
# -> the Oil Bar (the rope falls -> the work order -> O. CRANK).
# This is the deploy gate: if this doesn't pass, the game doesn't ship.

title: "Clanker City Chronicles — The Story So Far"
game: "--debuglevel=1 chronicles"
stage: docks.stage.json
transcript: docks.transcript.json

shots:
  # ------------------------------------------------ Scene 01: the Docks
  - name: arrival
    cutscene: DockRoom.entry
    expect: [talking]
    timeout: 60

  - name: the-sign
    do: {verb: Examine, object: neon sign}
    expect: [talking]

  - name: percussive-maintenance
    do: {verb: Use, object: neon sign}
    expect:
      - talking
      - pixel: {at: shiny bolt, is: bright-steel}

  - name: legal-tender
    do: {verb: Pick up, object: shiny bolt}
    expect:
      - talking
      - pixel: {at: inventory.slot0, is: bright-steel}

  - name: civic-duty
    do: {verb: Examine, object: notice board}
    expect: [talking]

  - name: take-the-evidence
    do: {verb: Pick up, object: official notice}
    expect:
      - pixel: {at: inventory.slot1, is: bright-steel}

  - name: meet-betty
    do: {verb: Talk to, object: Boom-Arm Betty}
    expect: [talking]
    hold: 1.5

  # --------------------------------------- Scene 02: the Scrap & Barrel
  - name: enter-the-tavern
    do: {verb: Open, object: tavern door}
    expect:
      - pixel: {at: [88, 9], is: magenta}    # the bar sign's glow dots
    timeout: 60

  - name: the-piano
    do: {verb: Examine, object: player piano}
    expect: [talking]

  - name: certified-maintenance
    do: {verb: Use, object: Gusket, with: inventory.slot0}
    expect:
      - talking
      # consumption compacts the inventory: poster shifts to slot0,
      # each new item appends at slot1
      - pixel: {at: inventory.slot1, is: greens}
    timeout: 60

  # on the validate path since editorial B9: the knock-code and the
  # Rustlers' name must be in every player's head before the heist
  - name: extremely-casual
    do: {verb: Talk to, object: "rustlers' table"}
    expect: [talking]
    timeout: 60
    hold: 1.5

  - name: the-dart-hustle
    do: {verb: Give, object: Flange, with: inventory.slot1}
    expect:
      - talking
      - pixel: {at: [284, 175], is: red}     # oil can's red base, slot 1
    timeout: 90

  # ----------------------------------------- Scene 01 again: the payoff
  - name: back-to-the-docks
    do: {verb: Open, object: door to the docks}
    expect:
      - pixel: {at: [10, 4], is: sky}        # night sky = we're outside
    timeout: 60

  - name: doctors-orders
    do: {verb: Use, object: Boom-Arm Betty, with: inventory.slot1}
    expect:
      - talking
      - pixel: {at: [132, 56], is: sky}      # crate no longer hanging
    timeout: 60

  - name: the-first-key
    do: {verb: Open, object: crate}
    expect:
      - talking
      - pixel: {at: inventory.slot1, is: sodium}   # brass key in pocket
    timeout: 60
    hold: 2.0

  # ------------------------------------- Scene 03: the Rustlers' alley
  - name: into-the-alley
    do: {verb: Open, object: alley mouth}
    expect:
      - pixel: {at: [76, 24], is: magenta}   # the graffiti's first coat
    timeout: 60

  - name: meet-rivet
    do: {verb: Talk to, object: Rivet}
    expect: [talking]
    timeout: 60

  - name: the-wall
    only: perform
    do: {verb: Examine, object: graffiti}
    expect: [talking]

  - name: message-discipline
    only: perform
    do: {verb: Open, object: steel door}
    expect: [talking]
    timeout: 60

  - name: dumpster-diving
    do: {verb: Open, object: dumpster}
    expect:
      - talking
      - pixel: {at: inventory.slot2, is: red}      # the bar magnet
    timeout: 60

  - name: back-out-front
    do: {verb: Open, object: way to the docks}
    expect:
      - pixel: {at: [10, 4], is: sky}
    timeout: 60

  - name: gone-fishing
    do: {verb: Use, object: storm drain, with: inventory.slot2}
    expect:
      - talking
      - pixel: {at: inventory.slot3, is: bright-steel}   # nine bolts
    timeout: 60

  - name: back-to-the-alley
    do: {verb: Open, object: alley mouth}
    expect:
      - pixel: {at: [76, 24], is: magenta}
    timeout: 60

  - name: try-the-fare
    do: {verb: Give, object: funicular gate, with: inventory.slot3}
    expect: [talking]                        # the gate blinks NINE
    timeout: 60

  - name: the-riddle-duel
    do: {verb: Talk to, object: Rivet, choose: 2}
    expect: [talking]
    timeout: 120

  - name: pay-the-fare
    do: {verb: Use, object: funicular gate}
    expect:
      - talking
      - pixel: {at: [284, 70], is: sodium}   # the car's lit window
    timeout: 90

  - name: now-boarding
    do: {verb: Examine, object: funicular gate}
    expect: [talking]
    timeout: 60
    hold: 2.0

  # -------------------------------------- Scene 04: Midtown Gearworks
  - name: ride-uptown
    do: {verb: Use, object: funicular gate}
    expect:
      - talking                              # the Midtown entry cutscene
      - pixel: {at: [180, 30], is: sodium}   # GRAND COG in lights
    timeout: 90

  - name: meet-the-clerk
    do: {verb: Talk to, object: box office}
    expect: [talking]
    timeout: 60

  - name: the-dynamo
    only: perform
    do: {verb: Examine, object: the Great Dynamo}
    expect: [talking]

  - name: nothing-is-wrong
    only: perform
    do: {verb: Examine, object: City Hall}
    expect: [talking]

  - name: nine-degrees
    only: perform
    do: {verb: Open, object: City Hall}
    expect: [talking]

  - name: the-act
    do: {verb: Use, object: box office, with: inventory.slot1}
    expect:
      - talking
      - pixel: {at: [182, 50], is: sodium}   # SPROCKET, in lights
    timeout: 90

  - name: in-lights
    do: {verb: Examine, object: Grand Cog Theater}
    expect: [talking]
    timeout: 60
    hold: 2.0

  # ------------------------------------- Scene 05: talent night
  - name: enter-the-grand-cog
    do: {verb: Open, object: Grand Cog Theater}
    expect:
      - talking                              # the house entry cutscene
      - pixel: {at: [110, 12], is: sodium}   # the chandelier of chandeliers
    timeout: 90

  - name: the-emcee
    do: {verb: Talk to, object: the emcee}
    expect: [talking]
    timeout: 60

  - name: tough-room
    only: perform
    do: {verb: Talk to, object: the audience}
    expect: [talking]

  - name: house-lights
    do: {verb: Use, object: spotlight booth}
    expect: [talking]
    timeout: 60

  - name: the-amazing-sprocket
    do: {verb: Use, object: the stage, with: inventory.slot1, choose: 2}
    expect:
      - talking
      - pixel: {at: [220, 40], is: teal}     # curtain open: the backdrop
      # the Rustlers take the key mid-ovation, so the inventory
      # compacts: poster0, magnet1, voucher2, pass3
      - pixel: {at: inventory.slot2, is: sodium}   # the oil voucher
    timeout: 150

  - name: stage-door
    do: {verb: Open, object: stage door}
    expect: [talking]
    timeout: 60
    hold: 2.0
  # ------------------------------- Scene 06: the reading
  - name: mind-the-cables
    do: {verb: Open, object: stage door}        # 2nd Open: silent transition
    cutscene: BackstageRoom.entry
    expect:
      - talking                                 # the robbed-arrival beat
      - pixel: {at: [256, 68], is: brass}       # Key #2, in its jar
    timeout: 90

  - name: the-parlor
    only: perform
    do: {verb: Examine, object: Madame Voltina}
    expect: [talking]

  - name: the-jar
    only: perform
    do: {verb: Examine, object: key in a jar}
    expect: [talking]

  - name: grabby                                # mistake: grab the prize
    only: perform
    do: {verb: Use, object: key in a jar}       # "The deposit is charged."
    expect: [talking]
    hold: 1.5

  - name: the-price
    do: {verb: Talk to, object: Madame Voltina} # intro: Card I dealt
    expect:
      - talking
      - pixel: {at: [155, 90], is: card-white}  # Card I (right edge: ego occludes x<154)
    timeout: 150

  - name: wrong-past                            # mistake: true, not printed
    only: perform                               # (dub label knowingly off:
    do: {verb: Use, object: reading table, with: inventory.slot1}
    expect: [talking]                           # shares card I's bucket)
    hold: 1.5

  - name: card-one
    do: {verb: Use, object: reading table, with: inventory.slot0}
    expect:
      - talking
      - pixel: {at: [166, 89], is: card-white}  # Card II dealt
    timeout: 90

  - name: card-two
    do: {verb: Use, object: reading table, with: inventory.slot2}
    cutscene: BackstageRoom.cardTwo
    expect:
      - talking
      - pixel: {at: [183, 89], is: rust}        # Card III, face down
    timeout: 90

  - name: the-bluff                             # mistake: lie to the psychic
    only: perform
    do: {verb: Use, object: reading table, choose: 1}
    cutscene: BackstageRoom.cardThreeBluff      # the zap gag
    expect: [talking]
    hold: 2.0

  - name: the-truth                             # the climax: motive, knock
    do: {verb: Use, object: reading table, choose: 2}   # echo, Key #2
    expect:
      - talking
      - pixel: {at: [256, 68], is: teal}        # jar EMPTY: brass gone
    timeout: 180

  - name: the-key-that-winds-itself             # the Old Crank plant
    do: {verb: Talk to, object: Madame Voltina, choose: 0}
    cutscene: BackstageRoom.optCrank
    expect: [talking]
    timeout: 90

  - name: occupational-hazards                  # her want (N-A6)
    only: perform
    do: {verb: Talk to, object: Madame Voltina, choose: 2}
    cutscene: BackstageRoom.optWant
    expect: [talking]

  - name: ghost-light                           # the clock beat (N-A5)
    only: perform
    do: {verb: Examine, object: ghost light}
    expect: [talking]

  - name: wardrobe
    only: perform
    do: {verb: Examine, object: costume rack}
    expect: [talking]

  - name: haircut
    only: perform
    do: {verb: Examine, object: cables}
    expect: [talking]

  - name: her-fuses
    only: perform
    do: {verb: Examine, object: fuse box}
    expect: [talking]

  - name: back-through-the-curtain
    do: {verb: Open, object: door to the stage} # silent; flavor stays put
    expect:
      - pixel: {at: [110, 12], is: sodium}      # the chandelier again
    timeout: 60
    hold: 2.0
  - name: out-of-the-wings                      # leave the theater first
    do: {verb: Open, object: lobby doors}       # silent transition
    expect:
      - pixel: {at: [180, 30], is: sodium}      # GRAND COG in lights
    timeout: 60

  - name: the-list-is-a-door                    # mistake: pre-rope Open
    only: perform
    do: {verb: Open, object: the Oil Bar}       # picture-of-the-door gag
    expect: [talking]
    hold: 1.5

  - name: a-separate-financial-instrument       # post-reading presentation
    do: {verb: Use, object: the Oil Bar, with: inventory.slot2}
    expect: [talking]                           # "after hours" (shipped B12)
    timeout: 60

  - name: redeemed-separately                   # detour: the escalation
    only: perform
    do: {verb: Use, object: the Oil Bar, with: inventory.slot2}
    expect: [talking]
    hold: 1.5

  - name: all-access-meets-rope                 # mistake: wrong paper
    only: perform
    do: {verb: Use, object: the Oil Bar, with: inventory.slot3}
    expect: [talking]                           # "That opens a door."
    hold: 1.5

  - name: professionally-agreed                 # mistake: the poster
    only: perform
    do: {verb: Use, object: the Oil Bar, with: inventory.slot0}
    expect: [talking]                           # "Agreed."
    hold: 1.5

  - name: established-as-a-concept              # the keystone inference
    do: {verb: Examine, object: velvet rope}
    expect: [talking]
    timeout: 60

  - name: velvet-all-the-way-down
    only: perform
    do: {verb: Smell, object: velvet rope}
    expect: [talking]

  - name: the-rope-participates                 # P1: the voucher, spent
    do: {verb: Use, object: velvet rope, with: inventory.slot2}
    expect:
      - talking
      - pixel: {at: [112, 95], is: red}         # state 2: coiled on post
    timeout: 120
    hold: 2.0
    # NOTE: voucher consumed -> inventory compacts; pass is slot2 now

  - name: oil-bar-arrival                       # silent door + entry
    do: {verb: Open, object: the Oil Bar}
    cutscene: OilBarRoom.entry
    expect:
      - talking
      - pixel: {at: [100, 30], is: amber}       # everything is amber
    timeout: 90

  - name: the-house-portrait
    only: perform
    do: {verb: Examine, object: portrait of the Mayor}
    expect: [talking]

  - name: learning-nothing
    only: perform
    do: {verb: Examine, object: centrifuge}
    expect: [talking]

  - name: drinking-in-formation                 # the booth toast
    only: perform
    do: {verb: Talk to, object: booth of aides}
    expect: [talking]
    timeout: 90

  - name: the-comma
    only: perform
    do: {verb: Talk to, object: booth of aides}
    expect: [talking]

  - name: the-folded-memo                       # aide intro (metAide)
    do: {verb: Talk to, object: the aide}
    expect: [talking]
    timeout: 120

  - name: walls-have-aides-early                # productive mistake
    only: perform
    do: {verb: Use, object: the aide, with: inventory.slot0}
    expect: [talking]                           # "Walls have aides."
    hold: 1.5

  - name: the-sommelier-of-crude                # somm intro (forced story)
    do: {verb: Talk to, object: oil sommelier}
    expect: [talking]
    timeout: 120

  - name: too-educated                          # mistake: round-1 flop
    only: perform
    do: {verb: Talk to, object: oil sommelier, choose: 0}
    expect: [talking]                           # Derrick Nine, refused
    timeout: 90
    hold: 1.5

  - name: not-touching-it                       # mistake: round-1 flop
    only: perform
    do: {verb: Talk to, object: oil sommelier, choose: 2}
    expect: [talking]                           # full all night
    timeout: 90
    hold: 1.5

  - name: the-order-pour                        # round 1 WIN (slot 1)
    do: {verb: Talk to, object: oil sommelier, choose: 1}
    expect: [talking]                           # the towel stops moving
    timeout: 90

  - name: no-ancestors                          # mistake: round-2 flop
    only: perform
    do: {verb: Talk to, object: oil sommelier, choose: 1}
    expect: [talking]                           # tabs are inherited
    timeout: 90
    hold: 1.5

  - name: settles-in-banners                    # mistake: the motive leak
    only: perform
    do: {verb: Talk to, object: oil sommelier, choose: 2}
    expect: [talking]
    timeout: 90
    hold: 1.5

  - name: all-three-counted                     # mistake: spike, guarded
    only: perform
    do: {verb: Use, object: receipt spike}
    expect: [talking]                           # pour, door, spike
    hold: 1.5

  - name: the-order-billing                     # round 2 WIN (slot 0)
    do: {verb: Talk to, object: oil sommelier, choose: 0}
    expect:
      - talking
      - pixel: {at: [92, 60], is: dock-wood}    # the figure is gone
    timeout: 120
    hold: 1.5

  - name: staff-only
    only: perform
    do: {verb: Open, object: cellar hatch}
    expect: [talking]                           # occupied by management

  - name: certified-archival-work               # P5: the grab + the serve
    do: {verb: Use, object: receipt spike}
    expect:
      - talking
      - pixel: {at: [146, 73], is: dock-wood}   # minus one document
      - pixel: {at: [92, 60], is: somm-black}   # he's back at his post
    timeout: 150
    hold: 1.5

  - name: ask-it-quiet                          # P6: the expose
    do: {verb: Talk to, object: the aide}
    expect: [talking]
    timeout: 150
    hold: 2.0

  - name: maximum-legal-gratitude
    only: perform
    do: {verb: Talk to, object: the aide}
    expect: [talking]

  - name: back-to-the-street
    do: {verb: Open, object: door to the street} # silent; flavor stays put
    expect:
      - pixel: {at: [180, 30], is: sodium}       # GRAND COG in lights
    timeout: 60
    hold: 2.0
