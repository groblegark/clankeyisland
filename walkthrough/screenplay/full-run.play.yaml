  # only:perform — the grab's gate is pourOrdered, set by the sommelier
  # contest, which is itself only:perform (harness note above). With the
  # contest streamer-cut in validate, the spike is still guarded, so this
  # beat (and its spike-taken / sommelier-returned pixels) belongs to the
  # perform pass. The handler now sets those states UP FRONT (oilbar.scc)
  # so the pixels hold the moment the grab fires.
  - name: certified-archival-work               # P5: the grab + the serve
