    cutscene: DockRoom.entry
    expect: [talking]
    timeout: 60

  - name: the-sign
    do: {verb: Examine, object: neon sign}
    expect: [talking]

  - name: percussive-maintenance
    do: {verb: Use, object: neon sign}
