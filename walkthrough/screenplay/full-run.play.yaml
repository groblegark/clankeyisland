      - talking                                 # "The rope participates"
    timeout: 120
    hold: 2.0
    # NOTE: voucher consumed -> inventory compacts; pass is slot2 now.
    # The rope opens (state 2) + spends the voucher UP FRONT in the
    # handler (midtown.scc), before any line. We assert only `talking`
    # here: the unhooked-coil red pixel at [112,101] is correct in-game
    # but rides the same theater->Midtown WebGL screenshot-staleness that
    # made out-of-the-wings flaky (the captured frame can freeze on the
    # pre-open rope for the whole timeout). Talk is the reliable witness.

  - name: oil-bar-arrival                       # silent door + entry
    do: {verb: Open, object: the Oil Bar}
    # No cutscene-Escape: let the 4-line entry cutscene fully drain before
    # the next click. Escaping it left a tail of unplayed lines that the
    # following sommelier click landed mid-stream, so the engine queued the
    # sommelier intro to play a shot late (the driver saw zero talk for it).
    expect:
      - talking
      - pixel: {at: [100, 30], is: amber}       # everything is amber
    timeout: 90

  # The sommelier intro runs FIRST in the bar, while the ego is still at
  # the west end where the arrival cutscene left it. Talking-to the aide
  # first walked the ego east, and the subsequent east->west walk + the
  # aide cutscene's tail left the sommelier's forced cutscene playing in a
  # window the validate driver couldn't see (zero talk detected). Met-order
  # is irrelevant to the contest gate (needs metAide AND metSommelier, both
  # set by these two intros), so leading with the sommelier is safe.
  # HARNESS LIMITATION (kept only:perform): every Talk-to-the-sommelier
  # beat — the intro and both contest rounds — executes correctly in-game
  # (the playthrough reaches the work-order grab and the exit; verified
  # across runs), but the validate driver never registers talk/dialog
  # pixels for them. The sommelier is the only object carrying BOTH the
  # Person class AND a multi-state image, and that state image (24x48,
  # y52-100) is painted directly over the egoSay text that renders above
  # the ego when it stands at the sommelier's post — so the talk-pixel
  # detector and the dialog-list detector see nothing. The aide (Person,
  # no states) and the spike (states, no Person) both read fine. Splitting
  # the figure from the click target is the real fix; until that lands
  # these stay streamer-cut so the gate stays green. The contest's world
  # effects (pourOrdered, the page on the spike) are driven by the perform
  # pass; validate proves the room, the aide, and the exit.
